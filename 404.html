<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>404 — Page not found · Pooja Kannan</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%230b0d10'/><text x='50%25' y='52%25' text-anchor='middle' dominant-baseline='middle' font-family='ui-monospace,Menlo,monospace' font-size='28' font-weight='700' fill='%237cf0c7'>PK</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d10; --ink: #e6e9ee; --ink-2: #b6bcc6; --ink-3: #7d8593;
    --line: #232932; --accent: #7cf0c7;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
  }
  html, body { margin:0; height:100%; background:var(--bg); color:var(--ink); font-family:var(--sans); }
  .wrap {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding: 40px 24px; text-align:center;
  }
  .code { font-family:var(--mono); font-size:14px; color:var(--accent); letter-spacing:0.12em; text-transform:uppercase; margin-bottom:16px; }
  h1 { font-family:var(--serif); font-weight:300; font-size: clamp(56px, 9vw, 120px); margin:0 0 16px; line-height:1; letter-spacing:-0.025em; }
  h1 em { color: var(--accent); font-style: italic; }
  p { color: var(--ink-2); max-width: 48ch; margin: 0 auto 32px; font-size: 18px; line-height:1.6; }
  a.btn {
    font-family:var(--mono); font-size:13px; padding: 13px 22px; border-radius:6px;
    background: var(--accent); color:#07110c; text-decoration:none; font-weight:500;
    display: inline-flex; align-items:center; gap:8px;
    transition: transform .2s ease;
  }
  a.btn:hover { transform: translateY(-1px); }
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="code">/ error 404</div>
      <h1>Page <em>not found.</em></h1>
      <p>This URL doesn't exist on the portfolio. Head back to the homepage to keep browsing.</p>
      <a class="btn" href="/">&larr; Back to homepage</a>
    </div>
  </div>
</body>
</html>
